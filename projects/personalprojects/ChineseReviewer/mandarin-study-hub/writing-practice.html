<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Practice</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Character writing</p>
        <h1>Writing Practice</h1>
        <p class="subtitle">Choose the lesson, set, and difficulty first. Then practice writing with the right amount of support.</p>
      </div>
      <div class="topbar-actions">
        <nav class="topnav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link active" href="writing-practice.html">Writing Practice</a>
          <a class="nav-link" href="grammar-practice.html">Grammar Lab</a>
        </nav>
        <button id="themeToggleButton" class="theme-toggle" type="button" aria-label="Toggle theme">☾</button>
      </div>
    </header>

    <main class="writing-layout">
      <section class="panel">
        <h2>Study setup</h2>
        <label>
          Lesson
          <select id="writingLessonSelector"></select>
        </label>
        <label>
          Section / set
          <select id="writingSetSelector"></select>
        </label>
        <label>
          Difficulty
          <select id="writingModeSelector">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <p id="modeDescription" class="subtitle"></p>
      </section>

      <section class="panel writing-stage">
        <div class="writing-header">
          <div>
            <div class="section-label">Prompt</div>
            <h2 id="writingPromptTitle">Choose a lesson and set</h2>
          </div>
          <div class="button-row">
            <button id="prevWritingButton" type="button">Previous</button>
            <button id="nextWritingButton" type="button">Next</button>
          </div>
        </div>

        <div class="writing-card" id="writingCard"></div>

        <div class="button-row hard-actions">
          <button id="playSoundButton" type="button" class="hidden">Speak</button>
          <button id="checkCharacterButton" type="button" class="hidden">Check character</button>
        </div>
        <div id="hardModeAnswer" class="feedback-box hidden"></div>

        <div class="section-block">
          <div class="section-label">Stroke support</div>
          <canvas id="writingCanvas" width="720" height="360"></canvas>
          <div class="button-row">
            <button id="clearCanvasButton" type="button">Clear</button>
            <button id="toggleGuideButton" type="button">Toggle guide</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">何尼腓 2026</footer>
  </div>

  <script src="data.js"></script>
  <script src="writing.js"></script>
</body>
</html>
