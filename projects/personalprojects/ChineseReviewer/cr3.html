<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarin Flashcard Reviewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h2 { color: #333; }

        .controls {
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .card-container {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fdfdfd;
            border: 2px solid #007bff;
        }

        .chinese { font-size: 3rem; margin: 0; }
        .pinyin { font-size: 1.2rem; color: #666; margin: 5px 0; }
        .english { font-size: 1.5rem; color: #333; font-weight: bold; }

        .nav-buttons {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }

        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; }

        .progress { margin-top: 15px; color: #777; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h2>Vocabulary Reviewer</h2>

    <div class="controls">
        <label for="modeSelect">Mode: </label>
        <select id="modeSelect" onchange="resetCard()">
            <option value="1">Traditional Chinese → English</option>
            <option value="2">Traditional Chinese → Pinyin & English</option>
            <option value="3">English → Traditional Chinese</option>
        </select>
    </div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front" id="frontContent">
                </div>
            <div class="card-face card-back" id="backContent">
                </div>
        </div>
    </div>

    <div class="progress" id="progressText">Card 1 of 12</div>

    <div class="nav-buttons">
        <button onclick="prevCard(event)">Previous</button>
        <button onclick="nextCard(event)">Next</button>
    </div>

    <script>
        const vocab = [
            { trad: "記得", pinyin: "jìde", eng: "to remember" },
            { trad: "記", pinyin: "jì", eng: "to record" },
            { trad: "想", pinyin: "xiǎng", eng: "to think" },
            { trad: "想起來", pinyin: "xiǎng qi lai", eng: "to remember, to recall" },
            { trad: "號碼", pinyin: "hàomǎ", eng: "number" },
            { trad: "搬", pinyin: "bān", eng: "to move" },
            { trad: "打掃", pinyin: "dǎsǎo", eng: "to clean up" },
            { trad: "掃", pinyin: "sǎo", eng: "to sweep" },
            { trad: "整理", pinyin: "zhěnglǐ", eng: "to put in order" },
            { trad: "房間", pinyin: "fángjiān", eng: "room" },
            { trad: "旅行", pinyin: "lǚxíng", eng: "to travel" },
            { trad: "電", pinyin: "diàn", eng: "electricity" }
        ];

        let currentIndex = 0;

        function updateCard() {
            const card = vocab[currentIndex];
            const mode = document.getElementById('modeSelect').value;
            const front = document.getElementById('frontContent');
            const back = document.getElementById('backContent');
            const cardElement = document.getElementById('card');
            
            cardElement.classList.remove('is-flipped');
            document.getElementById('progressText').innerText = `Card ${currentIndex + 1} of ${vocab.length}`;

            if (mode === "1") {
                front.innerHTML = `<p class="chinese">${card.trad}</p>`;
                back.innerHTML = `<p class="english">${card.eng}</p>`;
            } else if (mode === "2") {
                front.innerHTML = `<p class="chinese">${card.trad}</p>`;
                back.innerHTML = `<p class="pinyin">${card.pinyin}</p><p class="english">${card.eng}</p>`;
            } else {
                front.innerHTML = `<p class="english">${card.eng}</p>`;
                back.innerHTML = `<p class="chinese">${card.trad}</p><p class="pinyin">${card.pinyin}</p>`;
            }
        }

        function flipCard() {
            document.getElementById('card').classList.toggle('is-flipped');
        }

        function nextCard(event) {
            event.stopPropagation();
            currentIndex = (currentIndex + 1) % vocab.length;
            updateCard();
        }

        function prevCard(event) {
            event.stopPropagation();
            currentIndex = (currentIndex - 1 + vocab.length) % vocab.length;
            updateCard();
        }

        function resetCard() {
            currentIndex = 0;
            updateCard();
        }

        // Initialize first card
        updateCard();
    </script>
</body>
</html>
