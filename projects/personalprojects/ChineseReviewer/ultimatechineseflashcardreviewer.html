<head>
    <meta charset="UTF-8">

    <title>Chinese Study Hub</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #a78bfa;
            --success: #22c55e;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
        }

        .lesson-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }

        .dropdown-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        select {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            flex: 1;
        }

        select:focus { border-color: var(--accent); }

        #progress {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 0.1em;
        }

        .card-container {
            width: 420px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            padding: 30px;
            box-sizing: border-box;
            background: var(--card-bg);
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .card-front { font-size: 3.5rem; font-weight: 700; text-align: center; }
        .card-back { transform: rotateY(180deg); text-align: center; }

        .pinyin {
            font-size: 1.5rem;
            color: var(--accent-hover);
            margin-bottom: 10px;
        }

        .meaning { font-size: 1.6rem; color: var(--text-main); }

        .label {
            position: absolute;
            top: 15px;
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            background-color: var(--border);
            color: var(--text-main);
            transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); background-color: #475569; }
        button.primary { background-color: var(--accent); }
        button.success { background-color: var(--success); }

        .hidden { display: none !important; }

        @media (max-width: 450px) {
            .card-container { width: 90vw; height: 250px; }
            .card-front { font-size: 2.2rem; }
        }
    </style>
</head>

        let currentVocab = [];
        let currentIndex = 0;
        let mode = 0;

        function initLesson() {
            const lessonKey = document.getElementById('lessonSelector').value;
            const lessonData = data[lessonKey];
            document.getElementById('lessonDisplay').innerText = lessonData.title;
            
            const setSelector = document.getElementById('setSelector');
            setSelector.innerHTML = "";
            Object.keys(lessonData.sets).forEach(setName => {
                const opt = document.createElement('option');
                opt.value = setName;
                opt.innerText = setName;
                setSelector.appendChild(opt);
            });
            changeSet();
        }

        function changeSet() {
            const lessonKey = document.getElementById('lessonSelector').value;
            const setName = document.getElementById('setSelector').value;
            currentVocab = [...data[lessonKey].sets[setName]];
            resetPosition();
        }

        function flipCard() { document.getElementById('card').classList.toggle('is-flipped'); }

        function cycleMode() {
            mode = (mode + 1) % 3;
            updateCard();
        }

        function shuffleVocab() {
            currentVocab.sort(() => Math.random() - 0.5);
            resetPosition();
        }

        function resetPosition() {
            currentIndex = 0;
            document.getElementById('card').classList.remove('is-flipped');
            setTimeout(updateCard, 150);
        }

        function nextCard() {
            document.getElementById('card').classList.remove('is-flipped');
            currentIndex = (currentIndex + 1) % currentVocab.length;
            setTimeout(updateCard, 150);
        }

        function prevCard() {
            document.getElementById('card').classList.remove('is-flipped');
            currentIndex = (currentIndex - 1 + currentVocab.length) % currentVocab.length;
            setTimeout(updateCard, 150);
        }

        function updateCard() {
            const item = currentVocab[currentIndex];
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${currentVocab.length}`;
            const front = document.getElementById('frontText');
            const pinyin = document.getElementById('backPinyin');
            const meaning = document.getElementById('backMeaning');

            if (mode === 0) { // Char -> All
                front.innerText = item.char;
                pinyin.classList.remove('hidden');
                pinyin.innerText = item.pinyin;
                meaning.innerText = item.english;
            } else if (mode === 1) { // Char -> Eng
                front.innerText = item.char;
                pinyin.classList.add('hidden');
                meaning.innerText = item.english;
            } else { // Eng -> Char
                front.innerText = item.english;
                pinyin.classList.remove('hidden');
                pinyin.innerText = item.pinyin;
                meaning.innerText = item.char;
            }

            if (front.innerText.length > 10) {
                front.style.fontSize = "1.5rem";
            } else if (front.innerText.length > 5) {
                front.style.fontSize = "2.2rem";
            } else {
                front.style.fontSize = "3.5rem";
            }
        }

        initLesson();

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') { flipCard(); e.preventDefault(); }
            if (e.key === 'ArrowRight') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
        });
