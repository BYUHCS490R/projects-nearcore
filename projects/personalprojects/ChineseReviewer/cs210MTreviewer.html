<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Binary Logic Generator</title>
    <style>
        :root { --primary: #2563eb; --secondary: #7c3aed; --dark: #1e293b; --success: #059669; --danger: #dc2626; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: var(--dark); max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .mode-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-std { background: var(--primary); color: white; }
        .btn-hard { background: var(--danger); color: white; }
        .quiz-container { display: grid; gap: 15px; }
        .q-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-left: 6px solid #cbd5e1; }
        .q-card.correct { border-left-color: var(--success); background: #f0fdf4; }
        .q-card.wrong { border-left-color: var(--danger); background: #fef2f2; }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { padding: 8px; border: 2px solid #e2e8f0; border-radius: 6px; flex-grow: 1; font-family: monospace; }
        .feedback { font-size: 0.875rem; font-weight: bold; margin-top: 5px; display: block; }
        .status-bar { position: sticky; top: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 10; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>Binary Quiz Generator</h1>
    <p>Dynamic AI-style problems for Computer Science students.</p>
</div>

<div class="status-bar">
    <div>Mode: <span id="current-mode-label">Standard</span></div>
    <div>Score: <span id="score">0</span> / <span id="total-items">0</span></div>
    <button onclick="generateQuiz()" style="padding: 5px 10px; background: #64748b; color: white; font-size: 0.8rem;">Refresh Questions</button>
</div>

<div class="mode-selector">
    <button class="btn-std" onclick="setMode('std')">Switch to Standard (15 Items)</button>
    <button class="btn-hard" onclick="setMode('hard')">Switch to HARD MODE (17 Items)</button>
</div>

<div id="quiz-root" class="quiz-container"></div>

<script>
    let currentMode = 'std';
    let score = 0;

    const hexDigits = "0123456789ABCDEF";

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('current-mode-label').innerText = mode === 'std' ? 'Standard' : 'HARD MODE';
        document.getElementById('current-mode-label').style.color = mode === 'std' ? 'var(--primary)' : 'var(--danger)';
        generateQuiz();
    }

    function generateQuiz() {
        const root = document.getElementById('quiz-root');
        root.innerHTML = '';
        score = 0;
        updateScore();
        
        const itemCount = currentMode === 'std' ? 15 : 17;
        document.getElementById('total-items').innerText = itemCount;

        for (let i = 0; i < itemCount; i++) {
            const questionData = createQuestion(i);
            const card = document.createElement('div');
            card.className = 'q-card';
            card.id = `q-card-${i}`;
            card.innerHTML = `
                <div><strong>Q${i+1}:</strong> ${questionData.text}</div>
                <div class="input-group">
                    <input type="text" id="ans-${i}" placeholder="Type answer..." onkeypress="if(event.key==='Enter') check(${i}, '${questionData.answer}')">
                    <button onclick="check(${i}, '${questionData.answer}')">Submit</button>
                </div>
                <span id="feedback-${i}" class="feedback"></span>
            `;
            root.appendChild(card);
        }
    }

    function createQuestion(index) {
        const type = index % 6; // Rotate through topic types
        const range = currentMode === 'std' ? 32 : 255; // Higher numbers for hard mode

        if (type === 0) { // Dec to Bin
            let num = Math.floor(Math.random() * range) + 1;
            return { text: `Convert Decimal <b>${num}</b> to Binary:`, answer: num.toString(2) };
        } 
        else if (type === 1) { // Bin to Dec
            let num = Math.floor(Math.random() * range) + 1;
            return { text: `Convert Binary <b>${num.toString(2)}</b> to Decimal:`, answer: num.toString() };
        }
        else if (type === 2) { // Hex to Bin
            let num = Math.floor(Math.random() * range) + 1;
            return { text: `Convert Hex <b>${num.toString(16).toUpperCase()}</b> to Binary:`, answer: num.toString(2) };
        }
        else if (type === 3) { // Bin to Hex
            let num = Math.floor(Math.random() * range) + 1;
            return { text: `Convert Binary <b>${num.toString(2)}</b> to Hexadecimal:`, answer: num.toString(16).toUpperCase() };
        }
        else if (type === 4) { // Arithmetic (Add/Sub)
            let n1 = Math.floor(Math.random() * (range/2)) + 1;
            let n2 = Math.floor(Math.random() * (range/2)) + 1;
            if (index % 2 === 0) {
                return { text: `Add: <b>${n1.toString(2)}</b> + <b>${n2.toString(2)}</b> (Binary result):`, answer: (n1 + n2).toString(2) };
            } else {
                let high = Math.max(n1, n2);
                let low = Math.min(n1, n2);
                return { text: `Subtract: <b>${high.toString(2)}</b> - <b>${low.toString(2)}</b> (Binary result):`, answer: (high - low).toString(2) };
            }
        }
        else { // Signed/Complement (The Hardest)
            let num = Math.floor(Math.random() * 15) + 1;
            if (currentMode === 'std') {
                return { text: `What is the <b>1's Complement</b> of 4-bit <b>${num.toString(2).padStart(4, '0')}</b>?`, answer: (~num & 0xF).toString(2).padStart(4, '0') };
            } else {
                let bin8 = num.toString(2).padStart(8, '0');
                return { text: `What is the <b>2's Complement</b> of 8-bit <b>${bin8}</b>?`, answer: (((~num) + 1) & 0xFF).toString(2).padStart(8, '0') };
            }
        }
    }

    function check(id, correct) {
        const input = document.getElementById(`ans-${id}`);
        const feedback = document.getElementById(`feedback-${id}`);
        const card = document.getElementById(`q-card-${id}`);
        
        if (input.value.trim().toUpperCase() === correct.toUpperCase()) {
            feedback.innerText = "✓ CORRECT";
            feedback.className = "feedback success";
            card.className = "q-card correct";
            score++;
            updateScore();
        } else {
            feedback.innerText = `✗ WRONG (Correct: ${correct})`;
            feedback.className = "feedback danger";
            card.className = "q-card wrong";
        }
        input.disabled = true; // One attempt to keep it challenging
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
    }

    // Initialize
    generateQuiz();
</script>

</body>
</html>
